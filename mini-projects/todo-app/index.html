<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axios Todo App</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        h1 { text-align: center; margin-bottom: 1.5rem; }
        .input-group { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            outline: none;
        }
        button {
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        ul { list-style: none; padding: 0; }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid #f1f5f9;
        }
        .loading { text-align: center; color: #64748b; }
        .delete-btn { background: #ef4444; padding: 0.25rem 0.75rem; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Todo App</h1>
    <div class="input-group">
        <input type="text" id="todoInput" placeholder="Add a new task...">
        <button onclick="addTodo()">Add</button>
    </div>
    <div id="loading" class="loading" style="display: none;">Loading...</div>
    <ul id="todoList"></ul>
</div>

<script>
    const API_URL = 'https://jsonplaceholder.typicode.com/todos';
    const todoList = document.getElementById('todoList');
    const todoInput = document.getElementById('todoInput');
    const loading = document.getElementById('loading');

    // Fetch initial todos
    async function fetchTodos() {
        showLoading(true);
        try {
            const response = await axios.get(`${API_URL}?_limit=5`);
            response.data.forEach(todo => renderTodo(todo));
        } catch (error) {
            console.error('Error fetching todos:', error);
        } finally {
            showLoading(false);
        }
    }

    // Add a new todo (POST)
    async function addTodo() {
        const title = todoInput.value;
        if (!title) return;

        showLoading(true);
        try {
            const response = await axios.post(API_URL, {
                title: title,
                completed: false,
                userId: 1
            });
            renderTodo(response.data);
            todoInput.value = '';
        } catch (error) {
            alert('Failed to add todo');
        } finally {
            showLoading(false);
        }
    }

    // Delete a todo (DELETE)
    async function deleteTodo(id, element) {
        try {
            await axios.delete(`${API_URL}/${id}`);
            element.remove();
        } catch (error) {
            alert('Failed to delete');
        }
    }

    function renderTodo(todo) {
        const li = document.createElement('li');
        li.innerHTML = `
            <span>${todo.title}</span>
            <button class="delete-btn" onclick="deleteTodo(${todo.id}, this.parentElement)">Delete</button>
        `;
        todoList.appendChild(li);
    }

    function showLoading(isLoading) {
        loading.style.display = isLoading ? 'block' : 'none';
    }

    fetchTodos();
</script>

</body>
</html>
